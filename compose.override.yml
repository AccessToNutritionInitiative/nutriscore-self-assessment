services:
  traefik:
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "8080:8080"

  api:
    env_file:
      - .env
    build:
      context: .

  worker:
    env_file:
      - .env
    build:
      context: .

  ui:
    build:
      context: ui/
