services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Global HTTP → HTTPS redirect (enable on production)
      # - --entrypoints.web.http.redirections.entrypoint.to=websecure
      # - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Docker provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      # Let's Encrypt (enable on production)
      # - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      # - --certificatesresolvers.le.acme.storage=/acme.json
      # - --certificatesresolvers.le.acme.tlschallenge=true
      # Dashboard (disable on production)
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=web
      # - traefik.http.routers.api.entrypoints=websecure
      # - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8000

  ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://api:8000
    labels:
      - traefik.enable=true
      - traefik.http.routers.ui.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.ui.entrypoints=web
      # - traefik.http.routers.ui.entrypoints=websecure
      # - traefik.http.routers.ui.tls.certresolver=le
      - traefik.http.services.ui.loadbalancer.server.port=8501
